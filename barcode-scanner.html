<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan Barcode</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body style="font-family: Arial, sans-serif; background:#111; color:white; text-align:center; padding:20px; margin:0;">

  <h2 style="margin-top:20px;">📷 Scan Barcode</h2>

  <div style="max-width:360px; margin:0 auto;">
    <div id="reader" style="width:100%; border:4px solid white; border-radius:20px; overflow:hidden; background:black;"></div>

    <p id="status" style="opacity:0.85; margin-top:18px;">Tap Start to begin scanning...</p>

    <div style="display:flex; gap:10px; justify-content:center; margin-top:16px; flex-wrap:wrap;">
      <button onclick="startScanner()"
        style="padding:12px 16px; background:#4CAF50; border:none; border-radius:10px; color:white; font-size:16px; cursor:pointer;">
        ▶ Start
      </button>

      <button onclick="stopScanner()"
        style="padding:12px 16px; background:#666; border:none; border-radius:10px; color:white; font-size:16px; cursor:pointer;">
        ⏸ Stop
      </button>

      <button onclick="showDemoOptions()"
        style="padding:12px 16px; background:#2196F3; border:none; border-radius:10px; color:white; font-size:16px; cursor:pointer;">
        📦 Demo Scan
      </button>
    </div>

    <div id="demoPanel" style="display:none; margin-top:18px; background:#1d1d1d; border-radius:14px; padding:14px;">
      <p style="margin-top:0;">Choose a sample product</p>

      <button onclick="useDemoScan('5012345678900')"
        style="display:block; width:100%; margin-bottom:8px; padding:10px; border:none; border-radius:10px; background:#2e7d32; color:white;">
        Wireless Earbuds — £24.99
      </button>

      <button onclick="useDemoScan('5012345678901')"
        style="display:block; width:100%; margin-bottom:8px; padding:10px; border:none; border-radius:10px; background:#2e7d32; color:white;">
        Smart Watch — £39.99
      </button>

      <button onclick="useDemoScan('5012345678902')"
        style="display:block; width:100%; margin-bottom:8px; padding:10px; border:none; border-radius:10px; background:#2e7d32; color:white;">
        Bluetooth Speaker — £18.50
      </button>

      <button onclick="useDemoScan('5012345678903')"
        style="display:block; width:100%; padding:10px; border:none; border-radius:10px; background:#2e7d32; color:white;">
        Phone Charger — £11.99
      </button>
    </div>

    <br>

    <button onclick="goBack()"
      style="padding:10px 15px; background:#888; border:none; border-radius:10px; color:white; cursor:pointer;">
      ← Back
    </button>
  </div>

  <script>
    let html5QrCode = null;
    let scannerRunning = false;

    const priceLookup = {
      "5012345678900": { name: "Wireless Earbuds", price: 24.99 },
      "5012345678901": { name: "Smart Watch", price: 39.99 },
      "5012345678902": { name: "Bluetooth Speaker", price: 18.50 },
      "5012345678903": { name: "Phone Charger", price: 11.99 },
      "5000462107601": { name: "Cadbury Chocolate Bar", price: 2.50 },
      "5000159484695": { name: "Coca Cola 500ml", price: 1.80 },
      "5011417562762": { name: "Walkers Crisps", price: 2.25 }
    };

    function fallbackProduct(barcode) {
      const randomPrice = (Math.random() * 20 + 5).toFixed(2);
      return {
        name: "Retail Product",
        price: parseFloat(randomPrice)
      };
    }

    function saveScanResult(barcode) {
      const product = priceLookup[barcode] || fallbackProduct(barcode);
      localStorage.setItem("scannedBarcode", barcode);
      localStorage.setItem("scannedPrice", product.price.toFixed(2));
      localStorage.setItem("scannedName", product.name);
      window.location.href = "index.html";
    }

    async function startScanner() {
      const status = document.getElementById("status");

      try {
        if (!html5QrCode) {
          html5QrCode = new Html5Qrcode("reader");
        }

        if (scannerRunning) return;

        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: 250 },
          (decodedText) => {
            status.innerText = "Scanned: " + decodedText;
            stopScanner().then(() => saveScanResult(decodedText));
          },
          () => {}
        );

        scannerRunning = true;
        status.innerText = "Point the camera at a barcode...";
      } catch (err) {
        status.innerText = "Camera/scanner error: " + err;
      }
    }

    async function stopScanner() {
      if (html5QrCode && scannerRunning) {
        try {
          await html5QrCode.stop();
          await html5QrCode.clear();
        } catch (e) {}
        scannerRunning = false;
      }
    }

    function showDemoOptions() {
      const panel = document.getElementById("demoPanel");
      panel.style.display = panel.style.display === "none" ? "block" : "none";
    }

    function useDemoScan(barcode) {
      stopScanner().then(() => saveScanResult(barcode));
    }

    function goBack() {
      stopScanner().then(() => {
        window.location.href = "index.html";
      });
    }

    window.addEventListener("beforeunload", () => {
      stopScanner();
    });
  </script>

</body>
</html>
