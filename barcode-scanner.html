<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan Barcode</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      margin: 0;
      padding: 24px 18px;
      background: #0b0b0b;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      color: #cfcfcf;
      margin-bottom: 20px;
      font-size: 16px;
    }

    #reader {
      width: 100%;
      max-width: 420px;
      margin: 0 auto 20px auto;
      border-radius: 20px;
      overflow: hidden;
      border: 4px solid #ffffff;
      background: #000;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      min-width: 130px;
    }

    .start-btn {
      background: #4CAF50;
      color: white;
    }

    .stop-btn {
      background: #777;
      color: white;
    }

    .back-btn {
      background: #999;
      color: white;
      margin-top: 18px;
    }

    #status {
      margin-top: 14px;
      color: #d0d0d0;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>📷 Scan Barcode</h1>
  <p>Point your camera at a product barcode</p>

  <div id="reader"></div>

  <div class="btn-row">
    <button class="start-btn" onclick="startScanner()">▶ Start</button>
    <button class="stop-btn" onclick="stopScanner()">⏸ Stop</button>
  </div>

  <div id="status">Tap Start to begin scanning...</div>

  <button class="back-btn" onclick="goBack()">← Back</button>

  <script>
    let html5QrCode = null;
    let scannerRunning = false;

    function saveScan(barcode) {
      localStorage.setItem("scannedBarcode", barcode);
      localStorage.setItem("scannedPrice", "");
      localStorage.setItem("scannedName", "Retail Product");
      window.location.href = "index.html";
    }

    function onScanSuccess(decodedText) {
      if (!decodedText) return;

      if (navigator.vibrate) {
        navigator.vibrate(200);
      }

      stopScanner();
      saveScan(decodedText);
    }

    async function startScanner() {
      try {
        if (scannerRunning) return;

        html5QrCode = new Html5Qrcode("reader");
        scannerRunning = true;

        document.getElementById("status").innerText = "Starting camera...";

        await html5QrCode.start(
          { facingMode: "environment" },
          {
            fps: 10,
            qrbox: { width: 250, height: 120 }
          },
          onScanSuccess
        );

        document.getElementById("status").innerText = "Scanning...";
      } catch (err) {
        scannerRunning = false;
        document.getElementById("status").innerText = "Camera failed to start";
        console.log(err);
      }
    }

    async function stopScanner() {
      try {
        if (html5QrCode && scannerRunning) {
          await html5QrCode.stop();
          await html5QrCode.clear();
        }
      } catch (err) {
        console.log(err);
      } finally {
        scannerRunning = false;
        html5QrCode = null;
        document.getElementById("status").innerText = "Scanner stopped";
      }
    }

    function goBack() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
