<!DOCTYPE html>
<html>
<head>
  <title>Scan Barcode</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body style="text-align:center; font-family:Arial; background:#111; color:white;">

  <h2>📷 Scan Barcode</h2>

  <div id="reader" style="width:300px; margin:auto;"></div>

  <script>
    function onScanSuccess(decodedText) {
      localStorage.setItem("scannedBarcode", decodedText);
      localStorage.setItem("scannedName", "");
      localStorage.setItem("scannedPrice", "");

      window.location.href = "index.html";
    }

    new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 })
      .render(onScanSuccess);
  </script>

</body>
</html>
