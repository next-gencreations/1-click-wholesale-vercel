<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan Barcode</title>
</head>
<body style="font-family: Arial, sans-serif; background:#111; color:white; text-align:center; padding:20px; margin:0;">

  <h2 style="margin-top:20px;">📷 Scan Barcode</h2>

  <div style="max-width:360px; margin:0 auto;">
    <video
      id="video"
      autoplay
      playsinline
      muted
      style="width:100%; border:3px solid white; border-radius:20px; background:black;"
    ></video>

    <canvas id="canvas" style="display:none;"></canvas>

    <p id="status" style="opacity:0.8; margin-top:18px;">Starting camera…</p>

    <div style="display:flex; gap:10px; justify-content:center; margin-top:16px; flex-wrap:wrap;">
      <button onclick="startScanner()"
        style="padding:12px 16px; background:#4CAF50; border:none; border-radius:10px; color:white; font-size:16px; cursor:pointer;">
        ▶ Start
      </button>

      <button onclick="stopScanner()"
        style="padding:12px 16px; background:#666; border:none; border-radius:10px; color:white; font-size:16px; cursor:pointer;">
        ⏸ Stop
      </button>

      <button onclick="fakeScan()"
        style="padding:12px 16px; background:#2196F3; border:none; border-radius:10px; color:white; font-size:16px; cursor:pointer;">
        📦 Simulate Scan
      </button>
    </div>

    <br>

    <button onclick="goBack()"
      style="padding:10px 15px; background:#888; border:none; border-radius:10px; color:white; cursor:pointer;">
      ← Back
    </button>
  </div>

  <script>
    let stream = null;
    let scanTimer = null;
    let detector = null;

    async function startScanner() {
      const status = document.getElementById("status");
      const video = document.getElementById("video");

      try {
        if (!("BarcodeDetector" in window)) {
          status.innerText = "Barcode scanner not supported on this browser. Use Simulate Scan for now.";
          return;
        }

        detector = new BarcodeDetector({
          formats: [
            "ean_13",
            "ean_8",
            "upc_a",
            "upc_e",
            "code_128",
            "code_39"
          ]
        });

        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });

        video.srcObject = stream;
        status.innerText = "Point camera at a barcode…";

        if (scanTimer) clearInterval(scanTimer);
        scanTimer = setInterval(scanFrame, 800);

      } catch (err) {
        status.innerText = "Camera error: " + err.message;
      }
    }

    async function scanFrame() {
      const video = document.getElementById("video");
      const status = document.getElementById("status");

      if (!detector || video.readyState < 2) return;

      try {
        const barcodes = await detector.detect(video);

        if (barcodes.length > 0) {
          const code = barcodes[0].rawValue;
          status.innerText = "Scanned: " + code;

          // Demo price for now. Later this gets replaced by Amazon API/backend lookup.
          const demoAmazonPrice = 12.99;

          localStorage.setItem("scannedBarcode", code);
          localStorage.setItem("scannedPrice", demoAmazonPrice);

          stopScanner();
          window.location.href = "index.html";
        }
      } catch (err) {
        status.innerText = "Scanning error: " + err.message;
      }
    }

    function stopScanner() {
      if (scanTimer) {
        clearInterval(scanTimer);
        scanTimer = null;
      }

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
    }

    function fakeScan() {
      localStorage.setItem("scannedBarcode", "1234567890123");
      localStorage.setItem("scannedPrice", "12.99");
      window.location.href = "index.html";
    }

    function goBack() {
      stopScanner();
      window.location.href = "index.html";
    }

    window.addEventListener("beforeunload", stopScanner);
    window.onload = startScanner;
  </script>

</body>
</html>
