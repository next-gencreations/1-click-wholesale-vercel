<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1-Click Profit Finder</title>

<style>
body { font-family: Arial; background:#EEF4F2; padding:18px; }
.card,.section { max-width:560px; margin:18px auto; background:white; padding:20px; border-radius:20px; }
input { width:100%; padding:12px; margin-top:6px; border-radius:12px; border:1px solid #ccc; }
button { padding:12px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; }
.row { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
.row button { flex:1; }
.main { background:#5D8A7A; color:white; width:100%; }
.scan { background:#4CAF50; color:white; }
.link { background:#2196F3; color:white; }
.aff { background:#8E44AD; color:white; }
.idea { background:#E91E63; color:white; }
.insta { background:#C13584; color:white; }
.search { background:#009688; color:white; }
.banner { text-align:center; font-size:26px; color:white; padding:10px; border-radius:12px; margin:10px 0; }
.block { background:#F7FAF9; padding:10px; border-radius:12px; margin-top:10px; }
</style>
</head>

<body>

<div class="card">
<h2>1-Click Profit Finder</h2>

<label>Product</label>
<input id="productName" readonly>

<label>Barcode</label>
<input id="barcode" readonly>

<label>Buy Price</label>
<input id="buy" type="number" oninput="autoCalc()">

<label>Amazon Price</label>
<input id="amazon" type="number" oninput="autoCalc()">

<button class="main" onclick="calc()">Check Profit</button>

<div class="row">
<button class="scan" onclick="goScan()">📷 Scan</button>
<button class="link" onclick="pasteLink()">🔗 Link</button>
<button class="search" onclick="searchWeb()">🌍 Price Check</button>
</div>

<div id="result" style="display:none;">
<div id="banner" class="banner">BUY</div>
<div id="profit"></div>
<div id="roi"></div>

<div class="row">
<button class="aff" onclick="saveAffiliate()">💰 Save</button>
<button class="idea" onclick="generateIdea()">💡 Idea</button>
<button class="insta" onclick="generateInstagram()">📸 Insta</button>
</div>

<div id="ideaBox" class="block" style="display:none;"></div>
<div id="instaBox" class="block" style="display:none;"></div>

</div>
</div>

<div class="section">
<h3>Affiliate Products</h3>
<div id="affList"></div>
</div>

<div class="section">
<h3>Amazon Settings</h3>
<label>Affiliate ID</label>
<input id="affiliateId" placeholder="yourtag-21">
<button class="main" onclick="saveSettings()">Save</button>
</div>

<div class="section">
<h3>🔐 API Keys (future use)</h3>
<input id="apiKey" placeholder="Store API key safely">
<button onclick="saveKey()">Save Key</button>
</div>

<div class="section">
<h3>⚠️ Disclaimer</h3>
<p style="font-size:14px;">
Prices and profits are estimates only. Always verify before purchasing stock.
This tool is for guidance only.
</p>
</div>

<script>

function goScan(){ window.location.href="barcode-scanner.html"; }

function autoCalc(){
  if(buy.value && amazon.value) calc();
}

function calc(){
  let b=parseFloat(buy.value);
  let a=parseFloat(amazon.value);
  let fee=a*0.15;
  let profit=a-fee-b;
  let roi=(profit/b)*100;

  profit.innerText="Profit £"+profit.toFixed(2);
  roi.innerText="ROI "+roi.toFixed(1)+"%";

  if(profit>0 && roi>40){
    banner.innerText="BUY"; banner.style.background="#2E7D32";
  } else if(profit>0){
    banner.innerText="MAYBE"; banner.style.background="#F9A825";
  } else {
    banner.innerText="SKIP"; banner.style.background="#C62828";
  }

  result.style.display="block";
}

function generateAffiliateLink(link){
  let tag=localStorage.getItem("affiliateId");
  if(!tag) return link;
  return link.split("?")[0]+"?tag="+tag;
}

function pasteLink(){
  let link=prompt("Paste Amazon link");
  if(link){
    let aff=generateAffiliateLink(link);
    localStorage.setItem("link",aff);
    alert("Affiliate link ready");
  }
}

function saveAffiliate(){
  let item={
    name:productName.value,
    price:amazon.value,
    link:localStorage.getItem("link")||""
  };

  let list=JSON.parse(localStorage.getItem("aff")||"[]");
  list.unshift(item);
  localStorage.setItem("aff",JSON.stringify(list));

  renderAff();
}

function generateIdea(){
  let idea=`Top Amazon find: ${productName.value} under £${amazon.value}`;
  ideaBox.innerText=idea;
  ideaBox.style.display="block";
}

function generateInstagram(){
  let caption=`🔥 Amazon Find\n${productName.value}\nOnly £${amazon.value}\n\nCheck link in bio\n#amazonfinds #deals #ukshopping`;
  instaBox.innerText=caption;
  instaBox.style.display="block";
}

function searchWeb(){
  let query=productName.value;
  window.open("https://www.google.com/search?q="+query+" price");
}

function saveSettings(){
  localStorage.setItem("affiliateId",affiliateId.value);
  alert("Saved");
}

function saveKey(){
  localStorage.setItem("apiKey",apiKey.value);
  alert("Key saved locally");
}

function renderAff(){
  let list=JSON.parse(localStorage.getItem("aff")||"[]");
  affList.innerHTML=list.map(i=>`
    <div class="block">
      <b>${i.name}</b><br>
      £${i.price}<br>
      <small>${i.link}</small>
    </div>
  `).join("");
}

window.onload=function(){
  productName.value=localStorage.getItem("scannedName")||"";
  barcode.value=localStorage.getItem("scannedBarcode")||"";
  amazon.value=localStorage.getItem("scannedPrice")||"";
  affiliateId.value=localStorage.getItem("affiliateId")||"";
  renderAff();
};

</script>

</body>
</html>
