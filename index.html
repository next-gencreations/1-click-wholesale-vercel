<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>1-Click Profit Finder</title>

  <!-- ✅ PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6C998A">

  <style>
    body {
      margin:0;
      padding:20px;
      font-family: Arial;
      background:#EEF4F2;
    }

    .card {
      max-width:500px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:20px;
    }

    input {
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    button {
      width:100%;
      padding:12px;
      border-radius:10px;
      border:none;
      margin-top:8px;
      font-weight:bold;
    }

    .green { background:#4CAF50; color:white; }
    .blue { background:#2196F3; color:white; }
    .dark { background:#111; color:white; }
    .pink { background:#E91E63; color:white; }

    #result {
      margin-top:15px;
      background:#EEF4F2;
      padding:10px;
      border-radius:10px;
      display:none;
    }
  </style>
</head>

<body>

<div class="card">

<h2 style="text-align:center;">1-Click Profit Finder</h2>

<input id="productName" placeholder="Product" readonly>
<input id="brandName" placeholder="Brand" readonly>
<input id="barcode" placeholder="Barcode" readonly>

<input id="buy" type="number" placeholder="Buy Price (£)">
<input id="amazon" type="number" placeholder="Amazon Price (£)">

<button onclick="calculate()" style="background:#6C998A;color:white;">Check Profit</button>

<button class="green" onclick="goScan()">📷 Scan</button>
<button class="blue" onclick="openAmazon()">🛒 Amazon</button>
<button class="pink" onclick="manualLookup()">✍️ Manual Lookup</button>

<div id="result">
  <p id="profit"></p>
  <p id="roi"></p>
  <p id="verdict"></p>
</div>

<hr>

<button onclick="idea()">💡 Idea</button>
<button class="dark" onclick="tiktok()">🎥 TikTok</button>
<button class="pink" onclick="insta()">📸 Instagram</button>

<textarea id="output" style="margin-top:10px;"></textarea>

</div>

<script>

// SCAN PAGE
function goScan(){
  window.location.href="barcode-scanner.html";
}

// LOAD DATA
window.onload = async () => {
  const barcode = localStorage.getItem("scannedBarcode") || "";

  if(barcode){
    document.getElementById("barcode").value = barcode;

    await fetchProduct(barcode);
    await fetchAmazon(barcode);
  }
};

// PRODUCT LOOKUP
async function fetchProduct(barcode){
  try{
    const res = await fetch(`/api/lookup?barcode=${barcode}`);
    const data = await res.json();

    document.getElementById("productName").value = data.name || "Retail product";
    document.getElementById("brandName").value = data.brand || "";

  }catch{
    document.getElementById("productName").value = "Retail product";
  }
}

// AMAZON LOOKUP
async function fetchAmazon(barcode){
  try{
    const res = await fetch(`/api/amazon-price?barcode=${barcode}`);
    const data = await res.json();

    if(data.price){
      document.getElementById("amazon").value = data.price;
    }

    if(data.title){
      document.getElementById("productName").value = data.title;
    }

  }catch{}
}

// AMAZON BUTTON
function openAmazon(){
  const name = document.getElementById("productName").value;
  const url = "https://www.amazon.co.uk/s?k=" + encodeURIComponent(name);
  window.location.href = url;
}

// MANUAL LOOKUP
async function manualLookup(){
  const name = prompt("Product name?");
  const brand = prompt("Brand?");

  if(!name) return;

  document.getElementById("productName").value = name;
  document.getElementById("brandName").value = brand || "";

  const url = `/api/search-product?name=${name}&brand=${brand}`;
  const res = await fetch(url);
  const data = await res.json();

  if(data.barcode){
    document.getElementById("barcode").value = data.barcode;
  }

  fetchAmazon(name);
}

// CALCULATOR
function calculate(){
  const buy = parseFloat(document.getElementById("buy").value);
  const amazon = parseFloat(document.getElementById("amazon").value);

  if(!buy || !amazon) return;

  const fee = amazon * 0.15;
  const profit = amazon - fee - buy;
  const roi = ((profit / buy)*100).toFixed(1);

  document.getElementById("profit").innerText = "Profit £" + profit.toFixed(2);
  document.getElementById("roi").innerText = "ROI " + roi + "%";

  let verdict = "Skip";
  if(roi > 40) verdict = "🔥 BUY";
  else if(roi > 20) verdict = "👍 Maybe";

  document.getElementById("verdict").innerText = verdict;
  document.getElementById("result").style.display="block";
}

// CONTENT
function idea(){
  const name = document.getElementById("productName").value;
  document.getElementById("output").value =
  `${name} — found this in store, worth checking online`;
}

function tiktok(){
  const name = document.getElementById("productName").value;
  document.getElementById("output").value =
`🔥 Amazon find

${name}

#amazonfinds #reseller`;
}

function insta(){
  const name = document.getElementById("productName").value;
  document.getElementById("output").value =
`Amazon find 👀

${name}

#amazonfinds`;
}

// SERVICE WORKER
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/service-worker.js");
}

</script>

</body>
</html>
