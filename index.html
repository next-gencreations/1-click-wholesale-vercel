<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1-Click Profit Finder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #EEF4F2;
      padding: 20px;
      margin: 0;
    }

    .card {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-sizing: border-box;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }

    .readonly {
      background: #f7f7f7;
    }

    .main-btn, .scan-btn, .link-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .main-btn {
      background: #5D8A7A;
    }

    .button-row {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    .scan-btn {
      flex: 1;
      background: #4CAF50;
    }

    .link-btn {
      flex: 1;
      background: #2196F3;
    }

    #result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      display: none;
      background: #EEF4F2;
    }

    #result p {
      margin: 0 0 8px 0;
      color: #24323D;
      font-weight: 600;
    }

    #verdict {
      margin: 10px 0 0 0;
      color: #24323D;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #425564;
      font-size: 16px;
    }

    h2 {
      text-align: center;
      margin-top: 0;
      color: #24323D;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>1-Click Profit Finder</h2>

    <label>Product</label>
    <input
      id="productName"
      type="text"
      placeholder="Will fill from scanner"
      readonly
      class="readonly"
    />

    <label>Scanned Barcode</label>
    <input
      id="barcode"
      type="text"
      placeholder="Will fill from scanner"
      readonly
      class="readonly"
    />

    <label>Buy Price (£)</label>
    <input
      id="buy"
      type="number"
      step="0.01"
      placeholder="e.g. 5"
    />

    <label>Amazon Price (£)</label>
    <input
      id="amazon"
      type="number"
      step="0.01"
      placeholder="e.g. 12"
    />

    <button class="main-btn" onclick="calculate()">Check Profit</button>

    <div class="button-row">
      <button class="scan-btn" onclick="goToScanner()">📷 Scan Barcode</button>
      <button class="link-btn" onclick="pasteAmazonLink()">🔗 Paste Link</button>
    </div>

    <div id="result">
      <p id="fee"></p>
      <p id="profit"></p>
      <p id="roi"></p>
      <h3 id="verdict"></h3>
    </div>
  </div>

  <script>
    function goToScanner() {
      window.location.href = "barcode-scanner.html";
    }

    window.onload = function () {
      const scannedBarcode = localStorage.getItem("scannedBarcode");
      const scannedPrice = localStorage.getItem("scannedPrice");
      const scannedName = localStorage.getItem("scannedName");

      if (scannedBarcode) {
        document.getElementById("barcode").value = scannedBarcode;
        localStorage.removeItem("scannedBarcode");
      }

      if (scannedPrice) {
        document.getElementById("amazon").value = scannedPrice;
        localStorage.removeItem("scannedPrice");
      }

      if (scannedName) {
        document.getElementById("productName").value = scannedName;
        localStorage.removeItem("scannedName");
      }
    };

    function calculate() {
      const buy = parseFloat(document.getElementById("buy").value);
      const amazon = parseFloat(document.getElementById("amazon").value);

      if (!buy || !amazon) return;

      const fee = amazon * 0.15;
      const profit = amazon - fee - buy;
      const roi = ((profit / buy) * 100).toFixed(1);

      document.getElementById("fee").innerText = "Amazon Fee: £" + fee.toFixed(2);
      document.getElementById("profit").innerText = "Profit: £" + profit.toFixed(2);
      document.getElementById("roi").innerText = "ROI: " + roi + "%";

      let verdict = "";
      let color = "";

      if (roi > 40) {
        verdict = "🔥 Great opportunity";
        color = "#C8E6C9";
      } else if (roi > 20) {
        verdict = "👍 Worth a look";
        color = "#FFF3CD";
      } else {
        verdict = "❌ Probably skip";
        color = "#FFCDD2";
      }

      document.getElementById("verdict").innerText = verdict;

      const resultBox = document.getElementById("result");
      resultBox.style.display = "block";
      resultBox.style.background = color;
    }

    function pasteAmazonLink() {
      const link = prompt("Paste Amazon product link:");
      if (link) {
        alert("Link saved for future Amazon lookup.");
      }
    }
  </script>

</body>
</html>
