<body style="font-family: Arial; background:#EEF4F2; padding:20px;">

  <div style="max-width:500px; margin:auto; background:white; padding:20px; border-radius:20px;">

    <h2 style="text-align:center;">1-Click Profit Finder</h2>

    <label>Buy Price (£)</label>
    <input id="buy" type="number" placeholder="e.g. 5" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ccc;" />

    <label>Amazon Price (£)</label>
    <input id="amazon" type="number" placeholder="e.g. 12" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ccc;" />

    <button onclick="calculate()" style="width:100%; padding:12px; background:#5D8A7A; color:white; border:none; border-radius:10px;">
      Check Profit
    </button>

    <div id="result" style="margin-top:20px; padding:15px; background:#EEF4F2; border-radius:10px; display:none;">
      <p id="fee"></p>
      <p id="profit"></p>
      <p id="roi"></p>
      <h3 id="verdict"></h3>
    </div>

  </div>

  <script>
    function calculate() {
      const buy = parseFloat(document.getElementById("buy").value);
      const amazon = parseFloat(document.getElementById("amazon").value);

      if (!buy || !amazon) return;

      const fee = amazon * 0.15;
      const profit = amazon - fee - buy;
      const roi = ((profit / buy) * 100).toFixed(1);

      document.getElementById("fee").innerText = "Amazon Fee: £" + fee.toFixed(2);
      document.getElementById("profit").innerText = "Profit: £" + profit.toFixed(2);
      document.getElementById("roi").innerText = "ROI: " + roi + "%";

      let verdict = "";
      if (roi > 40) verdict = "Great opportunity";
      else if (roi > 20) verdict = "Worth a look";
      else verdict = "Probably skip";

      document.getElementById("verdict").innerText = verdict;

      document.getElementById("result").style.display = "block";
    }
  </script>

</body>
