<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1-Click Profit Finder</title>

<style>
body { font-family: Arial; background:#EEF4F2; padding:15px; }
.card { background:#fff; padding:20px; border-radius:20px; max-width:500px; margin:auto; }
input { width:100%; padding:12px; margin:8px 0; border-radius:12px; border:1px solid #ccc; }
button { padding:14px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; }
.row { display:flex; gap:10px; margin-top:10px; }
.row button { flex:1; }

.green { background:#4CAF50; color:white; }
.blue { background:#2196F3; color:white; }
.teal { background:#009688; color:white; }
.pink { background:#E91E63; color:white; }
.black { background:#000; color:white; }
.purple { background:#9C27B0; color:white; }
.grey { background:#777; color:white; }

.section { margin-top:20px; }
.box { background:#f7f7f7; padding:15px; border-radius:15px; margin-top:10px; }

textarea { width:100%; height:100px; margin-top:10px; }

</style>
</head>

<body>

<div class="card">

<h2>1-Click Profit Finder</h2>

<input id="productName" placeholder="Product" readonly>
<input id="barcode" placeholder="Barcode" readonly>

<input id="buy" placeholder="Buy Price (£)">
<input id="amazon" placeholder="Amazon Price (£)">

<button class="green" onclick="calculate()">Check Profit</button>

<div class="row">
<button class="green" onclick="scan()">📷 Scan</button>
<button class="blue" onclick="pasteLink()">🔗 Link</button>
<button class="teal" onclick="searchAmazon()">🛒 Amazon</button>
</div>

<div id="contentTools" class="section" style="display:none;">
  <h3>Content Tools</h3>

  <button class="pink" onclick="idea()">💡 Idea</button>
  <button class="black" onclick="tiktok()">🎥 TikTok</button>
  <button class="purple" onclick="instagram()">📸 Instagram</button>
  <button class="blue" onclick="saveAffiliate()">💰 Save Affiliate</button>
  <button class="grey" onclick="clearAll()">🗑 Clear</button>

  <div id="ideaBox" class="box" style="display:none;"></div>
  <textarea id="tiktokBox" style="display:none;"></textarea>
  <textarea id="instaBox" style="display:none;"></textarea>
</div>

<div id="result" class="section"></div>

</div>

<div class="card section">
<h3>Affiliate Products</h3>
<div id="affiliateList"></div>
</div>

<div class="card section">
<h3>Amazon Settings</h3>
<input id="affiliateId" placeholder="yourtag-21">
<button class="green" onclick="saveSettings()">Save</button>
</div>

<script>

function scan(){
  window.location.href = "barcode-scanner.html";
}

async function fetchProduct(barcode){
  try{
    const res = await fetch(`/api/lookup?barcode=${barcode}`);
    const data = await res.json();

    if(data.name){
      document.getElementById("productName").value = data.name;
      document.getElementById("contentTools").style.display = "block";
    }
  }catch(e){}
}

function calculate(){
  const buy = parseFloat(document.getElementById("buy").value);
  const amazon = parseFloat(document.getElementById("amazon").value);

  if(!buy || !amazon) return;

  const fee = amazon * 0.15;
  const profit = amazon - fee - buy;

  document.getElementById("result").innerHTML =
    `<div class="box">Profit: £${profit.toFixed(2)}</div>`;
}

function pasteLink(){
  const link = prompt("Paste Amazon link");
  const tag = localStorage.getItem("affiliateId");

  if(link){
    const clean = link.split("?")[0];
    const affiliate = tag ? clean + "?tag=" + tag : clean;

    localStorage.setItem("link", affiliate);
    alert("Affiliate link ready");
  }
}

function searchAmazon(){
  const q = document.getElementById("productName").value || document.getElementById("barcode").value;
  window.open("https://www.amazon.co.uk/s?k=" + q);
}

function idea(){
  const name = document.getElementById("productName").value;
  document.getElementById("ideaBox").innerText = `Sell ${name} as an Amazon find video`;
  document.getElementById("ideaBox").style.display = "block";
}

function tiktok(){
  const name = document.getElementById("productName").value;

  document.getElementById("tiktokBox").value =
`🔥 Amazon find

${name}

#amazonfinds #ukdeals`;

  document.getElementById("tiktokBox").style.display = "block";
}

function instagram(){
  const name = document.getElementById("productName").value;

  document.getElementById("instaBox").value =
`${name} 👀

#amazonfinds #shopping`;

  document.getElementById("instaBox").style.display = "block";
}

function saveAffiliate(){
  const list = JSON.parse(localStorage.getItem("aff") || "[]");

  list.unshift({
    name: document.getElementById("productName").value,
    price: document.getElementById("amazon").value,
    link: localStorage.getItem("link")
  });

  localStorage.setItem("aff", JSON.stringify(list));
  renderAff();
}

function renderAff(){
  const list = JSON.parse(localStorage.getItem("aff") || "[]");

  document.getElementById("affiliateList").innerHTML =
    list.map(i => `<div class="box">${i.name} - £${i.price}</div>`).join("");
}

function saveSettings(){
  localStorage.setItem("affiliateId", document.getElementById("affiliateId").value);
}

function clearAll(){
  location.reload();
}

window.onload = function(){
  const barcode = localStorage.getItem("scannedBarcode");

  if(barcode){
    document.getElementById("barcode").value = barcode;
    fetchProduct(barcode);
  }

  document.getElementById("affiliateId").value = localStorage.getItem("affiliateId") || "";

  renderAff();
}

</script>

</body>
</html>
