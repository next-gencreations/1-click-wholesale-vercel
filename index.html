<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1-Click Profit Finder</title>

<style>
*{box-sizing:border-box}
body{margin:0;padding:18px;font-family:Arial,sans-serif;background:linear-gradient(to bottom,#EEF4F2,#DDE7E3);color:#24323D}
.card{max-width:520px;margin:auto;background:white;border-radius:32px;padding:24px;box-shadow:0 12px 40px rgba(0,0,0,.10)}
.logo{text-align:center;font-size:62px;margin-bottom:6px}
h1{text-align:center;font-size:38px;margin:0;font-weight:1000;line-height:1}
.sub{text-align:center;margin-top:14px;color:#5B6770;font-size:17px;font-weight:700}
.scanButton{width:100%;margin-top:28px;padding:24px;border:none;border-radius:24px;background:linear-gradient(135deg,#36C95D,#249944);color:white;font-size:24px;font-weight:1000;box-shadow:0 8px 24px rgba(54,201,93,.35)}
.notice{margin-top:18px;padding:16px;border-radius:20px;background:#F7FAF9;color:#55796D;text-align:center;font-size:17px;font-weight:900}
.productImage{width:100%;max-height:220px;object-fit:contain;margin-top:16px;border-radius:22px;background:#F7FAF9;display:none}
label{display:block;margin-top:22px;margin-bottom:8px;font-size:15px;font-weight:900}
input{width:100%;padding:18px;border-radius:18px;border:2px solid #D8DDDF;font-size:18px;background:white}
.switch{margin-top:18px;background:#F7FAF9;border-radius:18px;padding:16px;display:flex;justify-content:space-between;align-items:center;font-weight:800}
.switch input{width:24px;height:24px}
.mainButton{width:100%;margin-top:20px;padding:20px;border:none;border-radius:22px;background:linear-gradient(135deg,#6C998A,#55796D);color:white;font-size:22px;font-weight:1000}
.row{display:flex;gap:10px;margin-top:14px}
.row button{flex:1;padding:18px;border:none;border-radius:18px;font-size:16px;font-weight:900;color:white}
.lookup{background:#009688}.amazon{background:#2196F3}.manual{background:#E91E63}.link{background:#FF9800}.save{background:#8E44AD}.clear{background:#666}.copy{background:#111}.share{background:#00A884}
.resultCard{margin-top:26px;border-radius:28px;padding:24px;display:none;color:white;animation:pop .35s ease}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.resultCard h2{margin:0 0 12px 0;font-size:38px;text-align:center}
.resultCard p{margin:12px 0;font-size:20px;font-weight:800}
.buy{background:linear-gradient(135deg,#1E7A36,#34B34F);box-shadow:0 10px 28px rgba(52,179,79,.35)}
.maybe{background:linear-gradient(135deg,#D98A00,#F9B233);box-shadow:0 10px 28px rgba(249,178,51,.35)}
.skip{background:linear-gradient(135deg,#9C1F1F,#D83A3A);box-shadow:0 10px 28px rgba(216,58,58,.35)}
.saved{margin-top:28px;padding:20px;background:#F7FAF9;border-radius:24px}
.savedHeader{display:flex;justify-content:space-between;align-items:center}
.sectionTitle{font-size:26px;font-weight:1000}
.savedCount{background:#24323D;color:white;padding:6px 12px;border-radius:999px;font-size:14px;font-weight:900}
.savedItem{margin-top:14px;background:white;padding:16px;border-radius:18px;border:1px solid #D8DDDF}
.savedTitle{font-weight:1000;font-size:18px}
.savedVerdict{margin-top:8px;font-size:14px;font-weight:900}
.savedText{margin-top:5px;color:#5B6770;font-size:14px}
.buyText{color:#1E7A36}.maybeText{color:#D98A00}.skipText{color:#C62828}
</style>
</head>

<body>

<div class="card">

<div class="logo">📦</div>

<h1>1-Click Profit Finder</h1>
<div class="sub">Scan products. Check profit. Save winners.</div>

<button class="scanButton" onclick="goScan()">📷 SCAN PRODUCT</button>

<div class="notice" id="notice">Scan a product to begin</div>

<img id="productImage" class="productImage">

<label>Product</label>
<input id="productName" placeholder="Product name">

<label>Brand</label>
<input id="brandName" placeholder="Brand">

<label>Barcode</label>
<input id="barcode" placeholder="Barcode">

<label>Shop Buy Price (£)</label>
<input id="buy" type="number" step="0.01" placeholder="Shelf / clearance price">

<label>Amazon Sell Price (£)</label>
<input id="amazon" type="number" step="0.01" placeholder="Enter Amazon price">

<div class="switch">
<span>Include VAT estimate (20%)</span>
<input id="vatToggle" type="checkbox">
</div>

<button class="mainButton" onclick="calculate()">💰 CHECK PROFIT</button>

<div class="row">
<button class="lookup" onclick="lookupProduct()">🔎 LOOKUP</button>
<button class="amazon" onclick="openAmazon()">🛒 AMAZON</button>
</div>

<div class="row">
<button class="link" onclick="pasteAmazonLink()">🔗 LINK</button>
<button class="manual" onclick="manualLookup()">✍️ MANUAL</button>
</div>

<div class="row">
<button class="copy" onclick="copyAffiliateLink()">📋 COPY</button>
<button class="share" onclick="shareDeal()">📤 SHARE</button>
</div>

<div id="resultCard" class="resultCard">
<h2 id="resultTitle">RESULT</h2>
<p id="profitText"></p>
<p id="roiText"></p>
<p id="feeText"></p>
<p id="vatText"></p>
<p id="verdictText"></p>
</div>

<div class="row">
<button class="save" onclick="saveScan()">⭐ SAVE</button>
<button class="clear" onclick="clearAll()">🗑 CLEAR</button>
</div>

<div class="saved">
<div class="savedHeader">
<div class="sectionTitle">Saved Products</div>
<div id="savedCount" class="savedCount">0</div>
</div>
<div id="savedList">No saved products yet.</div>
</div>

</div>

<script>
const AFFILIATE_TAG="nextgencreati-20";

function goScan(){
  window.location.href="barcode-scanner.html";
}

function setNotice(text){
  document.getElementById("notice").innerText=text;
}

function clean(v){
  return (v || "").toString().trim();
}

function buildAmazonSearchUrl(){
  const savedLink=localStorage.getItem("amazonLink");
  if(savedLink) return savedLink;

  const product=clean(document.getElementById("productName").value);
  const brand=clean(document.getElementById("brandName").value);
  const barcode=clean(document.getElementById("barcode").value);

  const search=[brand,product].filter(Boolean).join(" ") || barcode;

  if(!search) return "";

  const url="https://www.amazon.co.uk/s?k="+encodeURIComponent(search)+"&tag="+encodeURIComponent(AFFILIATE_TAG);
  localStorage.setItem("amazonLink",url);
  return url;
}

async function lookupProduct(){
  const barcode=clean(document.getElementById("barcode").value);
  const product=clean(document.getElementById("productName").value);

  if(!barcode && !product){
    alert("Scan or enter a product first");
    return;
  }

  setNotice("Looking up product...");

  const url=barcode
    ? "/api/product-search?barcode="+encodeURIComponent(barcode)
    : "/api/product-search?query="+encodeURIComponent(product);

  try{
    const res=await fetch(url);
    const data=await res.json();

    if(!data.success){
      setNotice("Product lookup failed");
      return;
    }

    document.getElementById("productName").value=data.productName || product || barcode;
    document.getElementById("brandName").value=data.brand || "";
    document.getElementById("barcode").value=data.barcode || barcode;

    if(data.image){
      const img=document.getElementById("productImage");
      img.src=data.image;
      img.style.display="block";
    }

    const search=[data.brand,data.productName].filter(Boolean).join(" ") || barcode || product;
    const amazonUrl="https://www.amazon.co.uk/s?k="+encodeURIComponent(search)+"&tag="+encodeURIComponent(AFFILIATE_TAG);
    localStorage.setItem("amazonLink",amazonUrl);

    setNotice("Product found — Amazon affiliate link ready");
  }catch(e){
    setNotice("Lookup error — try Amazon/manual");
  }
}

function calculate(){
  const buy=parseFloat(document.getElementById("buy").value);
  const amazon=parseFloat(document.getElementById("amazon").value);
  const vatOn=document.getElementById("vatToggle").checked;

  if(isNaN(buy)||isNaN(amazon)||buy<=0||amazon<=0){
    alert("Enter buy price and Amazon sell price first");
    return;
  }

  const fee=amazon*0.15;
  const vat=vatOn ? amazon*0.20 : 0;
  const profit=amazon-fee-vat-buy;
  const roi=(profit/buy)*100;

  const card=document.getElementById("resultCard");
  const title=document.getElementById("resultTitle");
  let verdictClass="";

  if(profit>5 && roi>40){
    card.className="resultCard buy";
    title.innerText="🔥 WINNER";
    document.getElementById("verdictText").innerText="⭐ Excellent reseller opportunity";
    verdictClass="buyText";
  }else if(profit>0){
    card.className="resultCard maybe";
    title.innerText="⚠️ MAYBE";
    document.getElementById("verdictText").innerText="⭐ Worth checking competition";
    verdictClass="maybeText";
  }else{
    card.className="resultCard skip";
    title.innerText="❌ SKIP";
    document.getElementById("verdictText").innerText="⭐ Profit too low after fees";
    verdictClass="skipText";
  }

  document.getElementById("profitText").innerHTML="💰 Profit: <strong>£"+profit.toFixed(2)+"</strong>";
  document.getElementById("roiText").innerHTML="📈 ROI: <strong>"+roi.toFixed(1)+"%</strong>";
  document.getElementById("feeText").innerHTML="🏷 Amazon Fee: £"+fee.toFixed(2);
  document.getElementById("vatText").innerHTML=vatOn ? "🧾 VAT Estimate: £"+vat.toFixed(2) : "🧾 VAT Estimate: OFF";
  document.getElementById("verdictText").className=verdictClass;

  card.style.display="block";
  setNotice("Profit checked — save this find if it looks good");
  navigator.vibrate?.(200);
}

function openAmazon(){
  const url=buildAmazonSearchUrl();

  if(!url){
    alert("Scan or enter product first");
    return;
  }

  window.open(url,"_blank");
}

function pasteAmazonLink(){
  const link=prompt("Paste Amazon product link");
  if(!link)return;

  const tagged=link.includes("tag=")
    ? link
    : link+(link.includes("?") ? "&" : "?")+"tag="+encodeURIComponent(AFFILIATE_TAG);

  localStorage.setItem("amazonLink",tagged);
  setNotice("Amazon link saved with tracking ID");
}

function manualLookup(){
  const name=prompt("Enter product name",document.getElementById("productName").value);
  if(name) document.getElementById("productName").value=name;

  const brand=prompt("Enter brand",document.getElementById("brandName").value);
  if(brand) document.getElementById("brandName").value=brand;

  lookupProduct();
}

async function copyAffiliateLink(){
  const url=buildAmazonSearchUrl();

  if(!url){
    alert("No Amazon link yet");
    return;
  }

  try{
    await navigator.clipboard.writeText(url);
    setNotice("Affiliate link copied");
  }catch(e){
    prompt("Copy this affiliate link",url);
  }
}

async function shareDeal(){
  const url=buildAmazonSearchUrl();

  if(!url){
    alert("No Amazon link yet");
    return;
  }

  const product=clean(document.getElementById("productName").value) || "Amazon find";
  const brand=clean(document.getElementById("brandName").value);
  const title=[brand,product].filter(Boolean).join(" ");

  const text="Found this: "+title+" "+url;

  if(navigator.share){
    try{
      await navigator.share({title:"1-Click Profit Finder",text,url});
      setNotice("Deal shared");
      return;
    }catch(e){}
  }

  try{
    await navigator.clipboard.writeText(text);
    setNotice("Share text copied");
  }catch(e){
    prompt("Copy this share text",text);
  }
}

function saveScan(){
  const saved=JSON.parse(localStorage.getItem("savedProducts") || "[]");

  saved.unshift({
    product:document.getElementById("productName").value || "Unknown Product",
    brand:document.getElementById("brandName").value || "",
    buy:document.getElementById("buy").value || "Not set",
    sell:document.getElementById("amazon").value || "Not set",
    barcode:document.getElementById("barcode").value || "None",
    profit:document.getElementById("profitText").innerText || "",
    roi:document.getElementById("roiText").innerText || "",
    verdict:document.getElementById("resultTitle").innerText || "",
    link:buildAmazonSearchUrl(),
    date:new Date().toLocaleString()
  });

  localStorage.setItem("savedProducts",JSON.stringify(saved.slice(0,50)));
  renderSaved();
  setNotice("Saved");
  navigator.vibrate?.([100,50,100]);
}

function renderSaved(){
  const box=document.getElementById("savedList");
  const saved=JSON.parse(localStorage.getItem("savedProducts") || "[]");

  document.getElementById("savedCount").innerText=saved.length;

  if(!saved.length){
    box.innerHTML="No saved products yet.";
    return;
  }

  box.innerHTML=saved.map(item=>{
    let cls="skipText";
    if((item.verdict||"").includes("WINNER")) cls="buyText";
    else if((item.verdict||"").includes("MAYBE")) cls="maybeText";

    return `
      <div class="savedItem">
        <div class="savedTitle">${[item.brand,item.product].filter(Boolean).join(" ")}</div>
        <div class="savedVerdict ${cls}">${item.verdict || "Saved"}</div>
        <div class="savedText">${item.profit || ""} ${item.roi ? "· "+item.roi : ""}</div>
        <div class="savedText">Buy: £${item.buy} · Sell: £${item.sell}</div>
        <div class="savedText">Barcode: ${item.barcode}</div>
        <div class="savedText">Saved: ${item.date}</div>
      </div>
    `;
  }).join("");
}

function clearAll(){
  document.getElementById("productName").value="";
  document.getElementById("brandName").value="";
  document.getElementById("barcode").value="";
  document.getElementById("buy").value="";
  document.getElementById("amazon").value="";
  document.getElementById("resultCard").style.display="none";
  document.getElementById("productImage").style.display="none";

  localStorage.removeItem("scannedBarcode");
  localStorage.removeItem("scannedName");
  localStorage.removeItem("scannedBrand");
  localStorage.removeItem("amazonLink");

  setNotice("Scan a product to begin");
}

window.onload=async ()=>{
  renderSaved();

  const barcode=localStorage.getItem("scannedBarcode") || "";
  const name=localStorage.getItem("scannedName") || "";
  const brand=localStorage.getItem("scannedBrand") || "";

  document.getElementById("barcode").value=barcode;
  document.getElementById("productName").value=name;
  document.getElementById("brandName").value=brand;

  if(barcode){
    await lookupProduct();
  }
}
</script>

</body>
</html>
