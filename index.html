<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1-Click Profit Finder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #EEF4F2;
      padding: 20px;
      margin: 0;
      color: #24323D;
    }

    .card {
      max-width: 520px;
      margin: 24px auto;
      background: white;
      padding: 22px;
      border-radius: 22px;
      box-sizing: border-box;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    h2 {
      text-align: center;
      font-size: 26px;
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      color: #425564;
      font-size: 16px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 6px;
      border-radius: 14px;
      border: 1px solid #cfcfcf;
      box-sizing: border-box;
      font-size: 16px;
      background: #fff;
    }

    .readonly {
      background: #f7f7f7;
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      background: #F7FAF9;
      border-radius: 14px;
      padding: 14px;
    }

    .switch-row label {
      margin: 0;
      font-size: 15px;
      line-height: 1.3;
      max-width: 75%;
    }

    .switch-row input[type="checkbox"] {
      width: 24px;
      height: 24px;
      margin: 0;
    }

    .main-btn,
    .scan-btn,
    .link-btn,
    .save-btn,
    .clear-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      color: white;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
    }

    .main-btn { background: #5D8A7A; }
    .scan-btn { background: #4CAF50; }
    .link-btn { background: #2196F3; }
    .save-btn { background: #FF9800; }
    .clear-btn { background: #777; }

    .button-row,
    .footer-actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
    }

    .button-row button,
    .footer-actions button {
      flex: 1;
    }

    .message {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      background: #E8F5E9;
      color: #2e7d32;
      display: none;
      font-weight: 700;
      text-align: center;
    }

    #result {
      margin-top: 20px;
      padding: 18px;
      border-radius: 16px;
      display: none;
      background: #EEF4F2;
    }

    .deal-banner {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 16px;
      color: white;
    }

    .result-line {
      margin: 0 0 10px 0;
      font-weight: 700;
      font-size: 20px;
    }

    .small-line {
      margin: 0 0 8px 0;
      font-weight: 600;
      font-size: 16px;
    }

    .section {
      margin: 22px auto 0;
      background: #ffffff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
      max-width: 520px;
      box-sizing: border-box;
    }

    .history-item, .saved-item {
      background: #F7FAF9;
      border: 1px solid #dde7e2;
      border-radius: 12px;
      padding: 12px;
      margin-top: 10px;
    }

    .item-title {
      font-weight: 800;
      margin-bottom: 4px;
      font-size: 18px;
    }

    .muted {
      color: #5f6f79;
      font-size: 14px;
      line-height: 1.45;
    }

    .empty {
      color: #7b8a93;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>1-Click Profit Finder</h2>

    <label>Product</label>
    <input
      id="productName"
      type="text"
      placeholder="Will fill from scanner"
      readonly
      class="readonly"
    />

    <label>Scanned Barcode</label>
    <input
      id="barcode"
      type="text"
      placeholder="Will fill from scanner"
      readonly
      class="readonly"
    />

    <label>Buy Price (£)</label>
    <input
      id="buy"
      type="number"
      step="0.01"
      placeholder="e.g. 5"
      oninput="calculateIfReady()"
    />

    <label>Amazon Price (£)</label>
    <input
      id="amazon"
      type="number"
      step="0.01"
      placeholder="e.g. 12"
      oninput="calculateIfReady()"
    />

    <div class="switch-row">
      <label for="vatToggle">Include VAT estimate (20%)</label>
      <input id="vatToggle" type="checkbox" onchange="calculateIfReady()" />
    </div>

    <button class="main-btn" onclick="calculate()">Check Profit</button>

    <div class="button-row">
      <button class="scan-btn" onclick="goToScanner()">📷 Scan Barcode</button>
      <button class="link-btn" onclick="pasteAmazonLink()">🔗 Paste Link</button>
    </div>

    <div id="scanMessage" class="message">✅ Product scanned successfully</div>

    <div id="result">
      <div id="dealBanner" class="deal-banner">GOOD DEAL</div>

      <p id="fee" class="small-line"></p>
      <p id="vatLine" class="small-line"></p>
      <p id="profit" class="result-line"></p>
      <p id="roi" class="result-line"></p>
      <h3 id="verdict"></h3>

      <div class="footer-actions">
        <button class="save-btn" onclick="saveDeal()">⭐ Save Deal</button>
        <button class="clear-btn" onclick="clearForm()">🗑 Clear</button>
      </div>
    </div>
  </div>

  <div class="section">
    <h3>Recent Scan History</h3>
    <div id="historyList"></div>
  </div>

  <div class="section">
    <h3>Saved Deals</h3>
    <div id="savedDealsList"></div>
  </div>

  <script>
    function goToScanner() {
      window.location.href = "barcode-scanner.html";
    }

    function pasteAmazonLink() {
      const link = prompt("Paste Amazon product link:");
      if (link) {
        alert("Link saved for future Amazon lookup.");
      }
    }

    function calculateIfReady() {
      const buy = document.getElementById("buy").value;
      const amazon = document.getElementById("amazon").value;
      if (buy && amazon) {
        calculate();
      }
    }

    function calculate() {
      const buy = parseFloat(document.getElementById("buy").value);
      const amazon = parseFloat(document.getElementById("amazon").value);
      const vatOn = document.getElementById("vatToggle").checked;

      if (!buy || !amazon) return;

      const fee = amazon * 0.15;
      const vat = vatOn ? amazon * 0.20 : 0;
      const profit = amazon - fee - vat - buy;
      const roi = ((profit / buy) * 100).toFixed(1);

      document.getElementById("fee").innerText = "Amazon Fee: £" + fee.toFixed(2);
      document.getElementById("vatLine").innerText = vatOn
        ? "VAT Estimate: £" + vat.toFixed(2)
        : "VAT Estimate: Off";
      document.getElementById("profit").innerText = "Profit: £" + profit.toFixed(2);
      document.getElementById("roi").innerText = "ROI: " + roi + "%";

      let verdict = "";
      let cardColor = "";
      let bannerText = "";
      let bannerColor = "";

      if (roi >= 40 && profit > 0) {
        verdict = "🔥 Great opportunity";
        cardColor = "#C8E6C9";
        bannerText = "BUY";
        bannerColor = "#2E7D32";
      } else if (roi >= 20 && profit > 0) {
        verdict = "👍 Worth a look";
        cardColor = "#FFF3CD";
        bannerText = "MAYBE";
        bannerColor = "#F9A825";
      } else {
        verdict = "❌ Probably skip";
        cardColor = "#FFCDD2";
        bannerText = "SKIP";
        bannerColor = "#C62828";
      }

      document.getElementById("verdict").innerText = verdict;

      const resultBox = document.getElementById("result");
