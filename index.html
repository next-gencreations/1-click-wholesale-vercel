
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1-Click Profit Finder</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:20px;
  font-family:Arial,sans-serif;
  background:#EEF4F2;
  color:#24323D;
}

.card{
  max-width:520px;
  margin:auto;
  background:white;
  border-radius:28px;
  padding:22px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
  text-align:center;
  font-size:54px;
  margin:0;
  font-weight:900;
  line-height:0.95;
}

.sub{
  text-align:center;
  margin-top:14px;
  color:#5B6770;
  font-size:17px;
  font-weight:700;
}

.scanButton{
  width:100%;
  margin-top:26px;
  padding:22px;
  border:none;
  border-radius:22px;
  background:#4CAF50;
  color:white;
  font-size:22px;
  font-weight:900;
}

label{
  display:block;
  margin-top:24px;
  margin-bottom:8px;
  font-size:15px;
  font-weight:900;
}

input{
  width:100%;
  padding:18px;
  border-radius:18px;
  border:2px solid #D8DDDF;
  font-size:18px;
}

.switch{
  margin-top:18px;
  background:#F7FAF9;
  border-radius:18px;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:700;
}

.switch input{
  width:24px;
  height:24px;
}

.mainButton{
  width:100%;
  margin-top:18px;
  padding:18px;
  border:none;
  border-radius:18px;
  background:#6C998A;
  color:white;
  font-size:20px;
  font-weight:900;
}

.row{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.row button{
  flex:1;
  padding:16px;
  border:none;
  border-radius:16px;
  font-size:16px;
  font-weight:900;
  color:white;
}

.amazon{
  background:#2196F3;
}

.manual{
  background:#E91E63;
}

.save{
  background:#8E44AD;
}

.clear{
  background:#666;
}

.resultCard{
  margin-top:22px;
  border-radius:22px;
  padding:22px;
  display:none;
  color:white;
}

.resultCard h2{
  margin:0 0 10px 0;
  font-size:34px;
}

.resultCard p{
  margin:8px 0;
  font-size:18px;
  font-weight:700;
}

.buy{
  background:#2E7D32;
}

.maybe{
  background:#F9A825;
}

.skip{
  background:#C62828;
}

.saved{
  margin-top:24px;
  padding:18px;
  background:#F7FAF9;
  border-radius:18px;
}

.savedItem{
  margin-top:12px;
  background:white;
  padding:14px;
  border-radius:14px;
  border:1px solid #D8DDDF;
}

.savedTitle{
  font-weight:900;
  font-size:18px;
}

.savedText{
  margin-top:4px;
  color:#5B6770;
  font-size:14px;
}

.sectionTitle{
  font-size:24px;
  font-weight:900;
}
</style>
</head>

<body>

<div class="card">

<h1>1-Click Profit Finder</h1>

<div class="sub">
Scan products. Check profit. Save winners.
</div>

<button class="scanButton" onclick="goScan()">
📷 Scan Product
</button>

<label>Product</label>
<input id="productName">

<label>Brand</label>
<input id="brandName">

<label>Barcode</label>
<input id="barcode">

<label>Buy Price (£)</label>
<input id="buy" type="number">

<label>Sell Price (£)</label>
<input id="amazon" type="number">

<div class="switch">
<span>Include VAT estimate (20%)</span>
<input id="vatToggle" type="checkbox">
</div>

<button class="mainButton" onclick="calculate()">
💰 Check Profit
</button>

<div class="row">
<button class="amazon" onclick="openAmazon()">
🛒 Search Amazon
</button>

<button class="manual" onclick="manualLookup()">
✍️ Manual Lookup
</button>
</div>

<div id="resultCard" class="resultCard">

<h2 id="resultTitle">BUY</h2>

<p id="profitText"></p>
<p id="roiText"></p>
<p id="feeText"></p>
<p id="vatText"></p>
<p id="verdictText"></p>

</div>

<div class="row">
<button class="save" onclick="saveScan()">
⭐ Save Scan
</button>

<button class="clear" onclick="clearAll()">
🗑 Clear
</button>
</div>

<div class="saved">
<div class="sectionTitle">
Recent Saved Products
</div>

<div id="savedList">
No saved products yet.
</div>
</div>

</div>

<script>

function goScan(){
  window.location.href="barcode-scanner.html";
}


  function calculate(){

  const buy=parseFloat(document.getElementById("buy").value);
  const amazon=parseFloat(document.getElementById("amazon").value);
  const vatOn=document.getElementById("vatToggle").checked;

  if(isNaN(buy)||isNaN(amazon)){
    alert("Enter prices");
    return;
  }

  const fee=amazon*0.15;
  const vat=vatOn ? amazon*0.20 : 0;

  const profit=amazon-fee-vat-buy;
  const roi=(profit/buy)*100;

  const card=document.getElementById("resultCard");
  const title=document.getElementById("resultTitle");

  let verdict="";

  if(profit>5 && roi>40){

    card.className="resultCard buy";
    title.innerText="🔥 WINNER";

    verdict="Excellent reseller opportunity";
  }

  else if(profit>0){

    card.className="resultCard maybe";
    title.innerText="⚠️ MAYBE";

    verdict="Worth checking competition";
  }

  else{

    card.className="resultCard skip";
    title.innerText="❌ SKIP";

    verdict="Profit too low after fees";
  }

  document.getElementById("profitText").innerHTML=
    "💰 Profit: <strong>£"+profit.toFixed(2)+"</strong>";

  document.getElementById("roiText").innerHTML=
    "📈 ROI: <strong>"+roi.toFixed(1)+"%</strong>";

  document.getElementById("feeText").innerHTML=
    "🏷 Amazon Fee: £"+fee.toFixed(2);

  document.getElementById("vatText").innerHTML=
    vatOn
    ? "🧾 VAT Estimate: £"+vat.toFixed(2)
    : "🧾 VAT Estimate: OFF";

  document.getElementById("verdictText").innerHTML=
    "⭐ "+verdict;

  card.style.display="block";

  navigator.vibrate?.(200);
}

  const fee=amazon*0.15;
  const vat=vatOn ? amazon*0.20 : 0;

  const profit=amazon-fee-vat-buy;
  const roi=(profit/buy)*100;

  const card=document.getElementById("resultCard");
  const title=document.getElementById("resultTitle");

  if(profit>3 && roi>35){
    card.className="resultCard buy";
    title.innerText="🔥 BUY";
  }
  else if(profit>0){
    card.className="resultCard maybe";
    title.innerText="⚠️ MAYBE";
  }
  else{
    card.className="resultCard skip";
    title.innerText="❌ SKIP";
  }

  document.getElementById("profitText").innerText=
    "Profit: £"+profit.toFixed(2);

  document.getElementById("roiText").innerText=
    "ROI: "+roi.toFixed(1)+"%";

  document.getElementById("feeText").innerText=
    "Amazon Fee: £"+fee.toFixed(2);

  document.getElementById("vatText").innerText=
    vatOn ? "VAT Estimate: £"+vat.toFixed(2) : "VAT Estimate: OFF";

  document.getElementById("verdictText").innerText=
    profit>0 ? "Potential winning product" : "Too weak after fees";

  card.style.display="block";
}

function openAmazon(){

  const product=document.getElementById("productName").value;
  const brand=document.getElementById("brandName").value;

  const search=[brand,product].join(" ");

  window.open(
    "https://www.amazon.co.uk/s?k="+encodeURIComponent(search),
    "_blank"
  );
}

function manualLookup(){

  const name=prompt("Enter product name");

  if(name){
    document.getElementById("productName").value=name;
  }
}

function saveScan(){

  const product=document.getElementById("productName").value || "Unknown Product";

  const buy=document.getElementById("buy").value || "Not set";

  const sell=document.getElementById("amazon").value || "Not set";

  const barcode=document.getElementById("barcode").value || "None";

  const saved=JSON.parse(localStorage.getItem("savedProducts") || "[]");

  saved.unshift({
    product,
    buy,
    sell,
    barcode,
    date:new Date().toLocaleString()
  });

  localStorage.setItem("savedProducts",JSON.stringify(saved));

  renderSaved();
}

function renderSaved(){

  const box=document.getElementById("savedList");

  const saved=JSON.parse(localStorage.getItem("savedProducts") || "[]");

  if(saved.length===0){
    box.innerHTML="No saved products yet.";
    return;
  }

  box.innerHTML=saved.map(item=>`
    <div class="savedItem">
      <div class="savedTitle">${item.product}</div>

      <div class="savedText">
        Buy: £${item.buy} · Sell: £${item.sell}
      </div>

      <div class="savedText">
        Barcode: ${item.barcode}
      </div>

      <div class="savedText">
        Saved: ${item.date}
      </div>
    </div>
  `).join("");
}

function clearAll(){

  document.getElementById("productName").value="";
  document.getElementById("brandName").value="";
  document.getElementById("barcode").value="";
  document.getElementById("buy").value="";
  document.getElementById("amazon").value="";

  document.getElementById("resultCard").style.display="none";
}

window.onload=()=>{

  renderSaved();

  const barcode=localStorage.getItem("scannedBarcode") || "";
  const name=localStorage.getItem("scannedName") || "";
  const brand=localStorage.getItem("scannedBrand") || "";

  document.getElementById("barcode").value=barcode;
  document.getElementById("productName").value=name;
  document.getElementById("brandName").value=brand;
}

</script>

</body>
</html>
