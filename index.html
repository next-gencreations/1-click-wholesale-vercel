<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>1-Click Profit Finder</title>

<style>
body { font-family: Arial; background:#EEF4F2; padding:18px; }
.card,.section { max-width:560px; margin:18px auto; background:white; padding:20px; border-radius:20px; }
input { width:100%; padding:12px; margin-top:6px; border-radius:12px; border:1px solid #ccc; }
button { padding:12px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; }
.row { display:flex; gap:10px; margin-top:10px; }
.row button { flex:1; }
.main { background:#5D8A7A; color:white; width:100%; margin-top:10px; }
.scan { background:#4CAF50; color:white; }
.link { background:#2196F3; color:white; }
.aff { background:#8E44AD; color:white; }
.save { background:#FF9800; color:white; }
.clear { background:#777; color:white; }
.banner { text-align:center; font-size:26px; color:white; padding:10px; border-radius:12px; margin-bottom:10px; }
</style>
</head>

<body>

<div class="card">
<h2>1-Click Profit Finder</h2>

<label>Product</label>
<input id="productName" readonly />

<label>Barcode</label>
<input id="barcode" readonly />

<label>Buy Price</label>
<input id="buy" type="number" oninput="autoCalc()" />

<label>Amazon Price</label>
<input id="amazon" type="number" oninput="autoCalc()" />

<button class="main" onclick="calc()">Check Profit</button>

<div class="row">
<button class="scan" onclick="goScan()">📷 Scan</button>
<button class="link" onclick="pasteLink()">🔗 Link</button>
</div>

<div id="result" style="display:none;">
<div id="banner" class="banner">BUY</div>
<div id="profit"></div>
<div id="roi"></div>

<div class="row">
<button class="save" onclick="saveDeal()">⭐ Save</button>
<button class="aff" onclick="saveAffiliate()">💰 Affiliate</button>
<button class="clear" onclick="clearForm()">🗑</button>
</div>
</div>
</div>

<div class="section">
<h3>Affiliate Products</h3>
<div id="affList"></div>
</div>

<div class="section">
<h3>Amazon Settings</h3>
<label>Affiliate ID</label>
<input id="affiliateId" placeholder="yourtag-21"/>
<button class="main" onclick="saveSettings()">Save</button>
</div>

<script>

// NAV
function goScan(){ window.location.href="barcode-scanner.html"; }

// AUTO CALC
function autoCalc(){
  if(buy.value && amazon.value) calc();
}

// PROFIT
function calc(){
  let b=parseFloat(buy.value);
  let a=parseFloat(amazon.value);
  let fee=a*0.15;
  let profit=a-fee-b;
  let roi=(profit/b)*100;

  profitEl.innerText="Profit £"+profit.toFixed(2);
  roiEl.innerText="ROI "+roi.toFixed(1)+"%";

  let banner=document.getElementById("banner");

  if(profit>0 && roi>40){
    banner.innerText="BUY";
    banner.style.background="#2E7D32";
  } else if(profit>0){
    banner.innerText="MAYBE";
    banner.style.background="#F9A825";
  } else {
    banner.innerText="SKIP";
    banner.style.background="#C62828";
  }

  result.style.display="block";
}

// AUTO AFFILIATE LINK 🔥
function generateAffiliateLink(link){
  let tag=localStorage.getItem("affiliateId");
  if(!tag){ alert("Add affiliate ID"); return link; }
  let clean=link.split("?")[0];
  return clean+"?tag="+tag;
}

// LINK INPUT
function pasteLink(){
  let link=prompt("Paste Amazon link");
  if(link){
    let affLink=generateAffiliateLink(link);
    localStorage.setItem("link",affLink);
    alert("Affiliate link created ✅");
  }
}

// SAVE AFFILIATE
function saveAffiliate(){
  let data={
    name:productName.value,
    price:amazon.value,
    link:localStorage.getItem("link")||"none"
  };

  let list=JSON.parse(localStorage.getItem("aff")||"[]");
  list.unshift(data);
  localStorage.setItem("aff",JSON.stringify(list));
  renderAff();
}

// RENDER
function renderAff(){
  let list=JSON.parse(localStorage.getItem("aff")||"[]");
  affList.innerHTML=list.map(i=>`
  <div style="margin-top:10px;">
    <b>${i.name}</b><br>
    £${i.price}<br>
    <small>${i.link}</small>
  </div>`).join("");
}

// SETTINGS
function saveSettings(){
  localStorage.setItem("affiliateId",affiliateId.value);
  alert("Saved");
}

// CLEAR
function clearForm(){
  productName.value="";
  barcode.value="";
  buy.value="";
  amazon.value="";
  result.style.display="none";
}

// LOAD
window.onload=function(){
  productName.value=localStorage.getItem("scannedName")||"";
  barcode.value=localStorage.getItem("scannedBarcode")||"";
  amazon.value=localStorage.getItem("scannedPrice")||"";
  affiliateId.value=localStorage.getItem("affiliateId")||"";
  renderAff();
};

</script>

</body>
</html>
