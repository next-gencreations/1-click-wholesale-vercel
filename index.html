<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1-Click Profit Finder</title>

<style>
body { font-family: Arial; background:#EEF4F2; padding:15px; }
.card { background:white; padding:20px; border-radius:20px; max-width:500px; margin:auto; }
input { width:100%; padding:10px; margin:8px 0; border-radius:10px; border:1px solid #ccc; }
button { padding:12px; border:none; border-radius:10px; margin-top:8px; font-weight:bold; }
.row { display:flex; gap:10px; }
.row button { flex:1; }
.banner { text-align:center; padding:10px; color:white; border-radius:10px; font-size:22px; }
.box { background:#F4F4F4; padding:10px; border-radius:10px; margin-top:10px; }
</style>
</head>

<body>

<div class="card">

<h2>1-Click Profit Finder</h2>

<input id="productName" placeholder="Product" readonly>
<input id="barcode" placeholder="Barcode" readonly>

<input id="buy" placeholder="Buy Price" type="number" oninput="autoCalc()">
<input id="amazon" placeholder="Amazon Price" type="number" oninput="autoCalc()">

<button onclick="calc()">Check Profit</button>

<div class="row">
<button onclick="goScan()">📷 Scan</button>
<button onclick="pasteLink()">🔗 Link</button>
<button onclick="searchAmazon()">🛒 Amazon</button>
</div>

<div id="result" style="display:none;">

<div id="banner" class="banner">BUY</div>

<div id="profit"></div>
<div id="roi"></div>
<div id="score"></div>

<div class="row">
<button onclick="generateIdea()">💡 Idea</button>
<button onclick="tiktokMode()">🎥 TikTok</button>
<button onclick="saveAffiliate()">💰 Save</button>
</div>

<div id="ideaBox" class="box" style="display:none;"></div>
<div id="tiktokBox" class="box" style="display:none;"></div>

</div>

</div>

<script>

// SCAN
function goScan(){ window.location.href="barcode-scanner.html"; }

// AUTO CALC
function autoCalc(){
  if(buy.value && amazon.value) calc();
}

// MAIN CALC
function calc(){
  let b=parseFloat(buy.value);
  let a=parseFloat(amazon.value);

  let fee=a*0.15;
  let profit=a-fee-b;
  let roi=(profit/b)*100;

  profitEl.innerText="Profit £"+profit.toFixed(2);
  roiEl.innerText="ROI "+roi.toFixed(1)+"%";

  // SCORE SYSTEM 🔥
  let score = 0;

  if(profit > 5) score += 30;
  if(roi > 40) score += 40;
  if(a < 50) score += 20;
  if(a < 20) score += 10;

  scoreEl.innerText="Score: "+score+"/100";

  // VERDICT
  if(score >= 70){
    banner.innerText="BUY";
    banner.style.background="#2E7D32";
  } else if(score >= 40){
    banner.innerText="MAYBE";
    banner.style.background="#F9A825";
  } else {
    banner.innerText="SKIP";
    banner.style.background="#C62828";
  }

  result.style.display="block";
}

// AMAZON SEARCH (LIVE FEEL)
function searchAmazon(){
  let query = productName.value || barcode.value;
  window.open("https://www.amazon.co.uk/s?k="+query);
}

// AFFILIATE LINK
function generateAffiliateLink(link){
  let tag=localStorage.getItem("affiliateId");
  if(!tag) return link;
  return link.split("?")[0]+"?tag="+tag;
}

function pasteLink(){
  let link=prompt("Paste Amazon link");
  if(link){
    let aff=generateAffiliateLink(link);
    localStorage.setItem("link",aff);
    alert("Affiliate link ready");
  }
}

// CONTENT IDEA
function generateIdea(){
  let idea = `Amazon find: ${productName.value} under £${amazon.value}`;
  ideaBox.innerText = idea;
  ideaBox.style.display="block";
}

// 🎥 TIKTOK MODE (MONEY MAKER)
function tiktokMode(){
  let text = `🔥 You won’t believe this\n${productName.value}\nOnly £${amazon.value}\n\n#amazonfinds #deals #tiktokshop`;
  tiktokBox.innerText = text;
  tiktokBox.style.display="block";
}

// SAVE
function saveAffiliate(){
  let item={
    name:productName.value,
    price:amazon.value,
    link:localStorage.getItem("link")||""
  };

  let list=JSON.parse(localStorage.getItem("aff")||"[]");
  list.unshift(item);
  localStorage.setItem("aff",JSON.stringify(list));

  alert("Saved");
}

// LOAD
window.onload=function(){
  productName.value=localStorage.getItem("scannedName")||"";
  barcode.value=localStorage.getItem("scannedBarcode")||"";
  amazon.value=localStorage.getItem("scannedPrice")||"";
};

</script>

</body>
</html>
