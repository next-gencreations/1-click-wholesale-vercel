<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1-Click Profit Finder</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 18px;
      background: #EEF4F2;
      font-family: Arial, sans-serif;
      color: #24323D;
    }

    .card, .section {
      max-width: 560px;
      margin: 18px auto;
      background: #fff;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    h2, h3 {
      margin: 0 0 16px 0;
      line-height: 1.2;
    }

    h2 {
      text-align: center;
      font-size: 26px;
      font-weight: 800;
    }

    h3 {
      font-size: 20px;
      font-weight: 800;
    }

    label {
      display: block;
      margin: 14px 0 8px;
      font-size: 16px;
      font-weight: 700;
      color: #425564;
    }

    input, textarea {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #d8d8d8;
      border-radius: 18px;
      font-size: 16px;
      background: #fff;
      outline: none;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .readonly {
      background: #f7f7f7;
      color: #666;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .main-btn {
      width: 100%;
      background: #6C998A;
      color: white;
      margin-top: 16px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .row button {
      flex: 1;
      min-width: 120px;
    }

    .scan-btn { background: #4CAF50; color: white; }
    .link-btn { background: #2196F3; color: white; }
    .amazon-btn { background: #009688; color: white; }
    .idea-btn { background: #E91E63; color: white; }
    .tiktok-btn { background: #111111; color: white; }
    .insta-btn { background: #C13584; color: white; }
    .affiliate-btn { background: #8E44AD; color: white; }
    .save-btn { background: #FF9800; color: white; }
    .clear-btn { background: #777; color: white; }

    .switch-row {
      margin-top: 16px;
      padding: 14px 16px;
      background: #F7FAF9;
      border: 1px solid #E0E6E3;
      border-radius: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .switch-row span {
      font-weight: 700;
      color: #425564;
    }

    .switch-row input {
      width: 26px;
      height: 26px;
    }

    #contentActions {
      display: none;
      margin-top: 18px;
      padding: 18px;
      border-radius: 20px;
      background: #F7FAF9;
      border: 1px solid #E0E6E3;
    }

    #result {
      display: none;
      margin-top: 18px;
      padding: 18px;
      border-radius: 20px;
      background: #EEF4F2;
    }

    .deal-banner {
      text-align: center;
      font-size: 28px;
      font-weight: 900;
      color: white;
      padding: 16px;
      border-radius: 18px;
      margin-bottom: 16px;
    }

    .big-line {
      font-size: 28px;
      font-weight: 900;
      margin: 8px 0;
    }

    .mid-line {
      font-size: 20px;
      font-weight: 800;
      margin: 8px 0;
      color: #425564;
    }

    .small-line {
      font-size: 16px;
      font-weight: 700;
      margin: 8px 0;
      color: #425564;
    }

    .block {
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      background: #F7FAF9;
      border: 1px solid #E0E6E3;
    }

    .item {
      margin-top: 12px;
      padding: 14px;
      border-radius: 16px;
      background: #F7FAF9;
      border: 1px solid #E0E6E3;
    }

    .item-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .muted {
      color: #61717B;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .empty {
      color: #8a98a1;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>1-Click Profit Finder</h2>

    <label>Product</label>
    <input id="productName" type="text" placeholder="Will fill after scan / lookup" readonly class="readonly" />

    <label>Barcode</label>
    <input id="barcode" type="text" placeholder="Will fill after scan" readonly class="readonly" />

    <label>Buy Price (£)</label>
    <input id="buy" type="number" step="0.01" placeholder="e.g. 6.00" oninput="calculateIfReady()" />

    <label>Amazon Price (£)</label>
    <input id="amazon" type="number" step="0.01" placeholder="Filled from demo/fallback or enter manually" oninput="calculateIfReady()" />

    <div class="switch-row">
      <span>Include VAT estimate (20%)</span>
      <input id="vatToggle" type="checkbox" onchange="calculateIfReady()" />
    </div>

    <button class="main-btn" onclick="calculate()">Check Profit</button>

    <div class="row">
      <button class="scan-btn" onclick="goToScanner()">📷 Scan</button>
      <button class="link-btn" onclick="pasteLink()">🔗 Add Amazon Link</button>
      <button class="amazon-btn" onclick="fetchAmazonPrice()">🛒 Amazon</button>
    </div>

    <div id="contentActions">
      <h3>Content Tools</h3>

      <div class="row">
        <button class="idea-btn" onclick="generateContentIdea()">💡 Idea</button>
        <button class="tiktok-btn" onclick="generateTikTokCaption()">🎥 TikTok</button>
        <button class="insta-btn" onclick="generateInstagramCaption()">📸 Instagram</button>
      </div>

      <div class="row">
        <button class="affiliate-btn" onclick="saveAffiliate()">💰 Save Affiliate</button>
        <button class="clear-btn" onclick="clearForm()">🗑 Clear</button>
      </div>

      <div id="ideaBox" class="block" style="display:none;">
        <div class="item-title">Content Idea</div>
        <div id="contentIdea" class="muted"></div>
      </div>

      <div id="tiktokBoxWrap" class="block" style="display:none;">
        <div class="item-title">TikTok Caption</div>
        <textarea id="tiktokCaption" readonly></textarea>
      </div>

      <div id="instagramBoxWrap" class="block" style="display:none;">
        <div class="item-title">Instagram Caption</div>
        <textarea id="instagramCaption" readonly></textarea>
      </div>
    </div>

    <div id="result">
      <div id="dealBanner" class="deal-banner">RESULT</div>
      <div id="profit" class="big-line">Profit: £0.00</div>
      <div id="roi" class="mid-line">ROI: 0%</div>
      <div id="fee" class="small-line">Referral Fee: £0.00</div>
      <div id="vatLine" class="small-line">VAT Estimate: Off</div>
      <div id="netSale" class="small-line">Net After Fees: £0.00</div>
      <div id="verdict" class="mid-line">Enter prices to calculate</div>

      <div class="row">
        <button class="save-btn" onclick="saveDeal()">⭐ Save Deal</button>
      </div>
    </div>
  </div>

  <div class="section">
    <h3>Affiliate Products</h3>
    <div id="affiliateList"></div>
  </div>

  <div class="section">
    <h3>Amazon Settings</h3>
    <label>Affiliate ID</label>
    <input id="affiliateId" type="text" placeholder="yourtag-21" />
    <button class="main-btn" onclick="saveSettings()">Save Settings</button>
  </div>

  <script>
    function goToScanner() {
      window.location.href = "barcode-scanner.html";
    }

    function showContentActionsIfProductExists() {
      const product = document.getElementById("productName").value.trim();
      const code = document.getElementById("barcode").value.trim();
      const amazon = document.getElementById("amazon").value.trim();

      if (product || code || amazon) {
        document.getElementById("contentActions").style.display = "block";
      }
    }

    async function fetchProduct(barcode) {
      try {
        const res = await fetch(`/api/lookup?barcode=${encodeURIComponent(barcode)}`);
        const data = await res.json();

        if (data.name) {
          document.getElementById("productName").value = data.name;
        } else {
          document.getElementById("productName").value = "Unknown Product";
        }
      } catch (e) {
        document.getElementById("productName").value = "Unknown Product";
      }

      showContentActionsIfProductExists();
    }

    async function fetchAmazonPrice() {
      const productName = document.getElementById("productName").value.trim();
      const barcode = document.getElementById("barcode").value.trim();

      if (!productName && !barcode) {
        alert("Scan a product first");
        return;
      }

      try {
        const url = productName
          ? `/api/amazon-price?query=${encodeURIComponent(productName)}&barcode=${encodeURIComponent(barcode)}`
          : `/api/amazon-price?barcode=${encodeURIComponent(barcode)}`;

        const res = await fetch(url);
        const data = await res.json();

        if (data.title && !document.getElementById("productName").value) {
          document.getElementById("productName").value = data.title;
        }

        if (data.price !== null && data.price !== undefined) {
          document.getElementById("amazon").value = data.price;
        }

        if (data.affiliateUrl) {
          const affiliateLink = applyAffiliateTag(data.affiliateUrl);
          localStorage.setItem("amazonLink", affiliateLink);
          localStorage.setItem("link", affiliateLink);
        }

        showContentActionsIfProductExists();
        calculateIfReady();

        if (data.source === "fallback-search" && !data.price) {
          alert("No live price found yet. Opening Amazon search fallback.");
          window.open(localStorage.getItem("amazonLink"), "_blank");
        }
      } catch (err) {
        alert("Amazon lookup failed");
      }
    }

    function calculateIfReady() {
      showContentActionsIfProductExists();

      const buy = document.getElementById("buy").value.trim();
      const amazon = document.getElementById("amazon").value.trim();

      if (buy !== "" && amazon !== "") {
        calculate();
      }
    }

    function calculate() {
      const buy = parseFloat(document.getElementById("buy").value);
      const amazon = parseFloat(document.getElementById("amazon").value);
      const vatOn = document.getElementById("vatToggle").checked;

      if (isNaN(buy) || isNaN(amazon) || buy <= 0 || amazon <= 0) {
        alert("Enter both Buy Price and Amazon Price");
        return;
      }

      const referralFee = amazon * 0.15;
      const vatEstimate = vatOn ? amazon * 0.20 : 0;
      const netAfterFees = amazon - referralFee - vatEstimate;
      const profit = netAfterFees - buy;
      const roi = (profit / buy) * 100;

      document.getElementById("fee").innerText = "Referral Fee: £" + referralFee.toFixed(2);
      document.getElementById("vatLine").innerText = vatOn
        ? "VAT Estimate: £" + vatEstimate.toFixed(2)
        : "VAT Estimate: Off";
      document.getElementById("netSale").innerText = "Net After Fees: £" + netAfterFees.toFixed(2);
      document.getElementById("profit").innerText = "Profit: £" + profit.toFixed(2);
      document.getElementById("roi").innerText = "ROI: " + roi.toFixed(1) + "%";

      const banner = document.getElementById("dealBanner");
      const verdict = document.getElementById("verdict");
      const result = document.getElementById("result");

      if (profit > 3 && roi >= 35) {
        banner.innerText = "BUY";
        banner.style.background = "#2E7D32";
        result.style.background = "#DDF3E1";
        verdict.innerText = "🔥 Strong deal";
      } else if (profit > 0 && roi >= 15) {
        banner.innerText = "MAYBE";
        banner.style.background = "#F9A825";
        result.style.background = "#FFF4D6";
        verdict.innerText = "👍 Possible deal";
      } else {
        banner.innerText = "SKIP";
        banner.style.background = "#C62828";
        result.style.background = "#F9DADA";
        verdict.innerText = "❌ Too weak after fees";
      }

      result.style.display = "block";
    }

    function applyAffiliateTag(url) {
      const tag = localStorage.getItem("affiliateId");
      if (!tag) return url;

      const separator = url.includes("?") ? "&" : "?";
      if (url.includes("tag=")) return url;
      return url + separator + "tag=" + encodeURIComponent(tag);
    }

    function pasteLink() {
      const link = prompt("Paste Amazon product link");
      if (!link) return;

      const affiliateLink = applyAffiliateTag(link);
      localStorage.setItem("amazonLink", affiliateLink);
      localStorage.setItem("link", affiliateLink);
      alert("Affiliate link saved");
    }

    function searchAmazon() {
      const product = document.getElementById("productName").value.trim();
      const code = document.getElementById("barcode").value.trim();
      const query = product || code;

      if (!query) {
        alert("Scan a product first");
        return;
      }

      const url = applyAffiliateTag("https://www.amazon.co.uk/s?k=" + encodeURIComponent(query));
      localStorage.setItem("amazonLink", url);
      window.open(url, "_blank");
    }

    function buildContentIdea() {
      const product = document.getElementById("productName").value || "this product";
      const amazon = document.getElementById("amazon").value || "0";

      return `Content angle: ${product} is selling around £${amazon}. Use it for Amazon finds, quick product reviews, or in-store discovery posts.`;
    }

    function generateContentIdea() {
      document.getElementById("contentIdea").innerText = buildContentIdea();
      document.getElementById("ideaBox").style.display = "block";
      showContentActionsIfProductExists();
    }

    function generateTikTokCaption() {
      const product = document.getElementById("productName").value || "This product";
      const amazon = document.getElementById("amazon").value || "0";

      const caption = `🔥 Amazon find\n\n${product}\nAmazon price: £${amazon}\n\nWould you buy this?\n\n#amazonfinds #ukdeals #reseller #dealfinds #tiktokmademebuyit`;

      document.getElementById("tiktokCaption").value = caption;
      document.getElementById("tiktokBoxWrap").style.display = "block";
      showContentActionsIfProductExists();
    }

    function generateInstagramCaption() {
      const product = document.getElementById("productName").value || "This product";
      const amazon = document.getElementById("amazon").value || "0";

      const caption = `Amazon find 👀\n\nProduct: ${product}\nAmazon price: £${amazon}\n\nSaving ideas like this for resale and affiliate content.\n\n#amazonfinds #instagramfinds #ukshopping #dealfinds #resellerlife`;

      document.getElementById("instagramCaption").value = caption;
      document.getElementById("instagramBoxWrap").style.display = "block";
      showContentActionsIfProductExists();
    }

    function saveAffiliate() {
      const product = document.getElementById("productName").value || "Unknown Product";
      const amazon = document.getElementById("amazon").value || "";
      const link = localStorage.getItem("amazonLink") || localStorage.getItem("link") || "";

      const list = JSON.parse(localStorage.getItem("aff") || "[]");
      list.unshift({
        name: product,
        price: amazon,
        link: link,
        idea: buildContentIdea()
      });

      localStorage.setItem("aff", JSON.stringify(list.slice(0, 20)));
      renderAffiliateList();
      alert("Affiliate product saved");
    }

    function saveDeal() {
      alert("Deal saved");
    }

    function renderAffiliateList() {
      const list = JSON.parse(localStorage.getItem("aff") || "[]");
      const box = document.getElementById("affiliateList");

      if (list.length === 0) {
        box.innerHTML = '<div class="empty">No affiliate products saved yet.</div>';
        return;
      }

      box.innerHTML = list.map(item => `
        <div class="item">
          <div class="item-title">${item.name}</div>
          <div class="muted">Amazon price: ${item.price ? "£" + item.price : "Not set"}</div>
          <div class="muted">Link: ${item.link || "No affiliate link saved"}</div>
          <div class="muted" style="margin-top:8px;">Idea: ${item.idea || "No idea saved"}</div>
        </div>
      `).join("");
    }

    function saveSettings() {
      localStorage.setItem("affiliateId", document.getElementById("affiliateId").value.trim());
      alert("Settings saved");
    }

    function clearForm() {
      document.getElementById("productName").value = "";
      document.getElementById("barcode").value = "";
      document.getElementById("buy").value = "";
      document.getElementById("amazon").value = "";
      document.getElementById("vatToggle").checked = false;
      document.getElementById("result").style.display = "none";
      document.getElementById("contentActions").style.display = "none";
      document.getElementById("ideaBox").style.display = "none";
      document.getElementById("tiktokBoxWrap").style.display = "none";
      document.getElementById("instagramBoxWrap").style.display = "none";
      localStorage.removeItem("scannedBarcode");
      localStorage.removeItem("scannedName");
      localStorage.removeItem("scannedPrice");
      localStorage.removeItem("amazonLink");
    }

    window.onload = async function() {
      const scannedBarcode = localStorage.getItem("scannedBarcode") || "";
      const scannedName = localStorage.getItem("scannedName") || "";
      const scannedPrice = localStorage.getItem("scannedPrice") || "";

      document.getElementById("barcode").value = scannedBarcode;
      document.getElementById("productName").value = scannedName;
      document.getElementById("amazon").value = scannedPrice;
      document.getElementById("affiliateId").value = localStorage.getItem("affiliateId") || "";

      if (scannedBarcode && !scannedName) {
        await fetchProduct(scannedBarcode);
      }

      if (scannedBarcode) {
        await fetchAmazonPrice();
      }

      showContentActionsIfProductExists();
      renderAffiliateList();
    };
  </script>
</body>
</html>
