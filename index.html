<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1-Click Profit Finder</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 18px;
      background: #EEF4F2;
      font-family: Arial, sans-serif;
      color: #24323D;
    }

    .card, .section {
      max-width: 560px;
      margin: 18px auto;
      background: #fff;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    h2, h3 {
      margin: 0 0 16px 0;
      line-height: 1.2;
    }

    h2 {
      text-align: center;
      font-size: 26px;
      font-weight: 800;
    }

    h3 {
      font-size: 20px;
      font-weight: 800;
    }

    label {
      display: block;
      margin: 14px 0 8px;
      font-size: 16px;
      font-weight: 700;
      color: #425564;
    }

    input, textarea {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #d8d8d8;
      border-radius: 18px;
      font-size: 16px;
      background: #fff;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .readonly {
      background: #f7f7f7;
      color: #666;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .main-btn {
      width: 100%;
      background: #6C998A;
      color: white;
      margin-top: 16px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .row button {
      flex: 1;
      min-width: 120px;
    }

    .scan-btn { background: #4CAF50; color: white; }
    .link-btn { background: #2196F3; color: white; }
    .amazon-btn { background: #009688; color: white; }
    .idea-btn { background: #E91E63; color: white; }
    .tiktok-btn { background: #111111; color: white; }
    .insta-btn { background: #C13584; color: white; }
    .save-btn { background: #FF9800; color: white; }
    .affiliate-btn { background: #8E44AD; color: white; }
    .clear-btn { background: #777; color: white; }

    .message {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #E6F7EA;
      color: #207245;
      font-weight: 700;
      text-align: center;
    }

    #contentActions {
      display: none;
      margin-top: 18px;
      padding: 18px;
      border-radius: 20px;
      background: #F7FAF9;
      border: 1px solid #E0E6E3;
    }

    #result {
      display: none;
      margin-top: 18px;
      padding: 18px;
      border-radius: 20px;
      background: #EEF4F2;
    }

    .deal-banner {
      text-align: center;
      font-size: 30px;
      font-weight: 900;
      color: white;
      padding: 16px;
      border-radius: 18px;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .profit-big {
      font-size: 30px;
      font-weight: 900;
      margin: 8px 0;
    }

    .roi-big {
      font-size: 22px;
      font-weight: 800;
      margin: 6px 0;
    }

    .score-big {
      font-size: 20px;
      font-weight: 800;
      margin: 6px 0 14px;
      color: #425564;
    }

    .small-line {
      font-size: 16px;
      font-weight: 700;
      margin: 8px 0;
      color: #425564;
    }

    #verdict {
      margin-top: 6px;
      font-size: 22px;
      font-weight: 900;
    }

    .block {
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      background: #F7FAF9;
      border: 1px solid #E0E6E3;
    }

    .item {
      margin-top: 12px;
      padding: 14px;
      border-radius: 16px;
      background: #F7FAF9;
      border: 1px solid #E0E6E3;
    }

    .item-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .muted {
      color: #61717B;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .empty {
      color: #8a98a1;
      font-size: 16px;
    }

    .tag {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: #eee;
    }

    .affiliate { background: #EFE0F7; color: #6f2c91; }
  </style>
</head>
<body>

  <div class="card">
    <h2>1-Click Profit Finder</h2>

    <label>Product</label>
    <input id="productName" type="text" placeholder="Will fill from scanner" readonly class="readonly" />

    <label>Barcode</label>
    <input id="barcode" type="text" placeholder="Will fill from scanner" readonly class="readonly" />

    <label>Buy Price (£)</label>
    <input id="buy" type="number" step="0.01" placeholder="e.g. 5" oninput="calculateIfReady()" />

    <label>Amazon Price (£)</label>
    <input id="amazon" type="number" step="0.01" placeholder="e.g. 12" oninput="calculateIfReady()" />

    <button class="main-btn" onclick="calculate()">Check Profit</button>

    <div class="row">
      <button class="scan-btn" onclick="goToScanner()">📷 Scan</button>
      <button class="link-btn" onclick="pasteLink()">🔗 Link</button>
      <button class="amazon-btn" onclick="searchAmazon()">🛒 Amazon</button>
    </div>

    <div id="scanMessage" class="message">✅ Product scanned successfully</div>

    <div id="contentActions">
      <h3>Content Tools</h3>
      <div class="row">
        <button class="idea-btn" onclick="generateContentIdea()">💡 Idea</button>
        <button class="tiktok-btn" onclick="generateTikTokCaption()">🎥 TikTok</button>
        <button class="insta-btn" onclick="generateInstagramCaption()">📸 Instagram</button>
      </div>

      <div class="row">
        <button class="affiliate-btn" onclick="saveAffiliate()">💰 Save Affiliate</button>
        <button class="clear-btn" onclick="clearForm()">🗑 Clear</button>
      </div>

      <div id="ideaBox" class="block" style="display:none;">
        <div class="item-title">Content Idea</div>
        <div id="contentIdea" class="muted"></div>
      </div>

      <div id="tiktokBox" class="block" style="display:none;">
        <div class="item-title">TikTok Caption</div>
        <textarea id="tiktokCaption" readonly></textarea>
      </div>

      <div id="instagramBox" class="block" style="display:none;">
        <div class="item-title">Instagram Caption</div>
        <textarea id="instagramCaption" readonly></textarea>
      </div>
    </div>

    <div id="result">
      <div id="dealBanner" class="deal-banner">BUY</div>
      <div id="profit" class="profit-big">Profit: £0.00</div>
      <div id="roi" class="roi-big">ROI: 0%</div>
      <div id="score" class="score-big">Score: 0/100</div>
      <div id="fee" class="small-line">Amazon Fee: £0.00</div>
      <div id="verdict">👍 Worth a look</div>
      <div class="row">
        <button class="save-btn" onclick="saveDeal()">⭐ Save Deal</button>
      </div>
    </div>
  </div>

  <div class="section">
    <h3>Affiliate Products</h3>
    <div id="affiliateList"></div>
  </div>

  <div class="section">
    <h3>Amazon Settings</h3>
    <label>Affiliate ID</label>
    <input id="affiliateId" type="text" placeholder="yourtag-21" />
    <button class="main-btn" onclick="saveSettings()">Save Settings</button>
  </div>

  <script>
    function goToScanner() {
      window.location.href = "barcode-scanner.html";
    }

    function showContentActionsIfProductExists() {
      const name = document.getElementById("productName").value.trim();
      const barcode = document.getElementById("barcode").value.trim();
      const amazon = document.getElementById("amazon").value.trim();

      if (name || barcode || amazon) {
        document.getElementById("contentActions").style.display = "block";
      }
    }

    function calculateIfReady() {
      const buy = document.getElementById("buy").value.trim();
      const amazon = document.getElementById("amazon").value.trim();
      showContentActionsIfProductExists();

      if (buy !== "" && amazon !== "") {
        calculate();
      }
    }

    function calculate() {
      const buy = parseFloat(document.getElementById("buy").value);
      const amazon = parseFloat(document.getElementById("amazon").value);

      if (isNaN(buy) || isNaN(amazon) || buy <= 0 || amazon <= 0) return;

      const fee = amazon * 0.15;
      const profit = amazon - fee - buy;
      const roi = (profit / buy) * 100;

      document.getElementById("fee").innerText = "Amazon Fee: £" + fee.toFixed(2);
      document.getElementById("profit").innerText = "Profit: £" + profit.toFixed(2);
      document.getElementById("roi").innerText = "ROI: " + roi.toFixed(1) + "%";

      let score = 0;
      if (profit > 5) score += 30;
      if (roi > 40) score += 40;
      if (amazon < 50) score += 20;
      if (amazon < 20) score += 10;

      document.getElementById("score").innerText = "Score: " + score + "/100";

      const banner = document.getElementById("dealBanner");
      const resultBox = document.getElementById("result");
      const verdict = document.getElementById("verdict");

      if (score >= 70) {
        banner.innerText = "BUY";
        banner.style.background = "#2E7D32";
        resultBox.style.background = "#DDF3E1";
        verdict.innerText = "🔥 Great opportunity";
      } else if (score >= 40) {
        banner.innerText = "MAYBE";
        banner.style.background = "#F9A825";
        resultBox.style.background = "#FFF4D6";
        verdict.innerText = "👍 Worth a look";
      } else {
        banner.innerText = "SKIP";
        banner.style.background = "#C62828";
        resultBox.style.background = "#F9DADA";
        verdict.innerText = "❌ Probably skip";
      }

      resultBox.style.display = "block";
    }

    function generateAffiliateLink(link) {
      const tag = localStorage.getItem("affiliateId");
      if (!tag) return link;
      const clean = link.split("?")[0];
      return clean + "?tag=" + tag;
    }

    function pasteLink() {
      const link = prompt("Paste Amazon link");
      if (link) {
        const affiliateLink = generateAffiliateLink(link);
        localStorage.setItem("link", affiliateLink);
        alert("Affiliate link ready ✅");
      }
    }

    function searchAmazon() {
      const query = document.getElementById("productName").value || document.getElementById("barcode").value;
      if (!query) {
        alert("Scan a product first");
        return;
      }
      window.open("https://www.amazon.co.uk/s?k=" + encodeURIComponent(query), "_blank");
    }

    function buildContentIdea() {
      const name = document.getElementById("productName").value || "this product";
      const price = document.getElementById("amazon").value || "0";

      return `Content angle: ${name} is selling around £${price}. Good for Amazon finds, product spotlights, or a quick in-store discovery post.`;
    }

    function generateContentIdea() {
      const idea = buildContentIdea();
      document.getElementById("contentIdea").innerText = idea;
      document.getElementById("ideaBox").style.display = "block";
      document.getElementById("contentActions").style.display = "block";
    }

    function generateTikTokCaption() {
      const name = document.getElementById("productName").value || "This product";
      const price = document.getElementById("amazon").value || "0";

      const caption =
`🔥 Amazon find

Product: ${name}
Amazon price: £${price}

Would you buy this?

#amazonfinds #ukdeals #reseller #flipfinds #tiktokmademebuyit`;

      document.getElementById("tiktokCaption").value = caption;
      document.getElementById("tiktokBox").style.display = "block";
      document.getElementById("contentActions").style.display = "block";
    }

    function generateInstagramCaption() {
      const name = document.getElementById("productName").value || "This product";
      const price = document.getElementById("amazon").value || "0";

      const caption =
`Amazon find 👀

Product: ${name}
Amazon price: £${price}

Saving product ideas like this for resale and affiliate content.

#amazonfinds #instagramfinds #ukshopping #resellerlife #dealfinds`;

      document.getElementById("instagramCaption").value = caption;
      document.getElementById("instagramBox").style.display = "block";
      document.getElementById("contentActions").style.display = "block";
    }

    function saveDeal() {
      alert("Saved deal");
    }

    function saveAffiliate() {
      const item = {
        name: document.getElementById("productName").value || "Unknown Product",
        price: document.getElementById("amazon").value || "0",
        link: localStorage.getItem("link") || "",
        idea: buildContentIdea()
      };

      const list = JSON.parse(localStorage.getItem("aff") || "[]");
      list.unshift(item);
      localStorage.setItem("aff", JSON.stringify(list.slice(0, 20)));
      renderAffiliateList();
      alert("Affiliate product saved");
    }

    function renderAffiliateList() {
      const list = JSON.parse(localStorage.getItem("aff") || "[]");
      const box = document.getElementById("affiliateList");

      if (list.length === 0) {
        box.innerHTML = '<div class="empty">No affiliate products saved yet.</div>';
        return;
      }

      box.innerHTML = list.map(i => `
        <div class="item">
          <div class="item-title">${i.name}</div>
          <div class="muted">Amazon price: £${i.price}</div>
          <div class="muted">Link: ${i.link || "No link saved"}</div>
          <div class="muted" style="margin-top:8px;">Idea: ${i.idea || "No idea saved"}</div>
          <div class="tag affiliate">AFFILIATE</div>
        </div>
      `).join("");
    }

    function saveSettings() {
      localStorage.setItem("affiliateId", document.getElementById("affiliateId").value);
      alert("Settings saved");
    }

    function clearForm() {
      document.getElementById("productName").value = "";
      document.getElementById("barcode").value = "";
      document.getElementById("buy").value = "";
      document.getElementById("amazon").value = "";
      document.getElementById("result").style.display = "none";
      document.getElementById("contentActions").style.display = "none";
      document.getElementById("ideaBox").style.display = "none";
      document.getElementById("tiktokBox").style.display = "none";
      document.getElementById("instagramBox").style.display = "none";
    }

    window.onload = function() {
      async function fetchProduct(barcode) {
  try {
    const res = await fetch(`/api/lookup?barcode=${barcode}`);
    const data = await res.json();

    if (data.name) {
      document.getElementById("productName").value = data.name;
    }
  } catch (e) {
    console.log("Lookup failed");
  }
}
      document.getElementById("productName").value = localStorage.getItem("scannedName") || "";
      document.getElementById("barcode").value = localStorage.getItem("scannedBarcode") || "";
      document.getElementById("amazon").value = localStorage.getItem("scannedPrice") || "";
      document.getElementById("affiliateId").value = localStorage.getItem("affiliateId") || "";

      renderAffiliateList();
      showContentActionsIfProductExists();

      if (
        localStorage.getItem("scannedName") ||
        localStorage.getItem("scannedBarcode") ||
        localStorage.getItem("scannedPrice")
      ) {
        document.getElementById("scanMessage").style.display = "block";
        setTimeout(() => {
          document.getElementById("scanMessage").style.display = "none";
        }, 2000);
      }
    };
  </script>
</body>
</html>
